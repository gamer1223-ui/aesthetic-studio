<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aesthetic Studio</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;

/* light pink + purple blend */

background:linear-gradient(135deg,#ffe6f2,#f0e6ff,#ffeaf6);

}


/* HEADER */

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:25px 60px;

}

.title{

font-size:40px;
font-weight:bold;

}

.logo{

width:60px;

}


/* TEXT INTRO */

.intro{

text-align:center;
margin-top:30px;

}

.intro h2{

font-size:26px;

}

.intro p{

color:#555;
margin-top:5px;

}


/* PHOTO GRID */

.gallery{

max-width:1100px;
margin:60px auto;

display:grid;

grid-template-columns:1fr 1fr;

gap:50px;

padding:0 40px;

}


/* PHOTO CARD */

.photo{

width:100%;
height:340px;

border-radius:18px;

overflow:hidden;

box-shadow:0 10px 25px rgba(0,0,0,0.25);

}

.photo img{

width:100%;
height:100%;

object-fit:cover;

}


/* TEXT BETWEEN */

.info-text{

grid-column:span 2;

text-align:center;

font-size:18px;

color:#444;

margin-top:10px;

}


/* BUTTON AREA */

.buttons{

text-align:center;

margin-top:40px;

}


/* BUTTONS */

.btn{

padding:14px 30px;

font-size:16px;

border:none;

border-radius:12px;

cursor:pointer;

color:white;

background:#6a5cff;

margin:10px;

box-shadow:0 5px 12px rgba(0,0,0,0.25);

}

.ai{

background:#ff5ecf;

}


/* FOOTER */

footer{

text-align:center;

margin-top:200px;

padding-bottom:40px;

}

footer a{

margin:0 20px;

text-decoration:none;

color:black;

font-weight:bold;

}

</style>

</head>

<body>


<header>

<div class="title">Aesthetic Studio</div>

<img src="logo.png" class="logo">

</header>


<div class="intro">

<h2>Create beautiful photos</h2>

<p>Crop, design, add stickers and create aesthetic images easily.</p>

</div>


<div class="gallery">

<div class="photo">
<img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0">
</div>

<div class="photo">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
</div>

<div class="photo">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
</div>

<div class="photo">
<img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97">
</div>

<div class="info-text">

Create stunning edits with powerful tools.  
Design your photos just like professional editors.

</div>

</div>


<div class="buttons">

<button class="btn">Do By Your Own</button>

<button class="btn ai">Create With AI</button>

</div>


<footer>

<a href="#">About Us</a>
<a href="#">Privacy Policy</a>
<a href="#">Contact</a>

</footer>


</body>

</html>
