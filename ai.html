<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Studio</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

.container{
  padding:40px;
}

/* TITLE */
.title{
  font-size:45px;
  font-weight:bold;
  margin-bottom:20px;
}

/* INPUT */
input[type="text"]{
  width:70%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:20px;
}

/* FILE INPUT */
input[type="file"]{
  margin-top:20px;
  color:white;
}

/* BUTTON */
button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:black;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

/* RESULT */
.result{
  margin-top:20px;
  font-size:16px;
  color:#ccc;
}

/* IMAGE PREVIEW */
.preview{
  margin-top:20px;
  max-width:300px;
  border-radius:12px;
  display:none;
}
</style>
</head>

<body>

<div class="container">

<div class="title">AI Editor</div>

<div>Upload your image and describe the edit</div>

<!-- TEXT INPUT -->
<input type="text" id="textInput" placeholder="Type your idea...">

<br>

<!-- FILE UPLOAD -->
<input type="file" id="imageInput" accept="image/*">

<br>

<!-- BUTTON -->
<button onclick="generate()">Generate</button>

<!-- IMAGE PREVIEW -->
<img id="preview" class="preview">

<!-- RESULT -->
<div id="result" class="result"></div>

</div>

<script>
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", function(){
  const file = this.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

function generate(){
  const text = document.getElementById("textInput").value;
  const result = document.getElementById("result");

  if(text === ""){
    result.innerHTML = "⚠ Please enter your idea";
    return;
  }

  result.innerHTML = "✨ Generating...";

  setTimeout(()=>{
    result.innerHTML = "✨ Suggestion: Increase contrast, add glow, and smooth tones for aesthetic look.";
  },1500);
}
</script>

</body>
</html>
