<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aesthetic Studio</title>

<style>

body{

margin:0;
font-family:Arial;

/* pink purple gradient */

background:linear-gradient(135deg,#ffd6ec,#e3d4ff);

min-height:1600px;

}

/* header */

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 40px;

}

.title{

font-size:36px;
font-weight:bold;

}

.logo{

width:60px;

}


/* photo grid */

.gallery{

max-width:1200px;

margin:auto;

display:grid;

grid-template-columns:1fr 1fr;

gap:60px;

padding:80px 40px;

}


/* photo style */

.photo{

width:100%;

aspect-ratio:16/9;

border-radius:16px;

overflow:hidden;

box-shadow:0 8px 20px rgba(0,0,0,0.25);

}

.photo img{

width:100%;
height:100%;

object-fit:cover;

}


/* center area */

.center-area{

grid-column:span 2;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

gap:20px;

margin:30px 0;

}


/* buttons */

.main-btn{

padding:14px 28px;

font-size:16px;

border:none;

border-radius:12px;

cursor:pointer;

color:white;

background:#6a5cff;

box-shadow:0 5px 12px rgba(0,0,0,0.2);

}

.ai-btn{

background:#ff4fbf;

}


/* footer */

footer{

margin-top:200px;

text-align:center;

padding:30px;

}

footer a{

margin:0 20px;

text-decoration:none;

color:black;

font-weight:bold;

}

.email{

margin-top:10px;

font-size:14px;

}

</style>

</head>

<body>


<header>

<div class="title">Aesthetic Studio</div>

<img src="logo.png" class="logo">

</header>


<div class="gallery">

<!-- edited style image -->

<div class="photo">

<img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb">

</div>


<div class="photo">

<img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511">

</div>


<!-- middle buttons -->

<div class="center-area">

<button class="main-btn">Do By Your Own</button>

<button class="main-btn ai-btn">Create With AI</button>

</div>


<div class="photo">

<img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c">

</div>


<div class="photo">

<img src="https://images.unsplash.com/photo-1600573472592-401b489a3cdc">

</div>

</div>


<footer>

<a href="#">About Us</a>

<a href="#">Privacy Policy</a>

<a href="#">Contact</a>

<div class="email">

Email: proboys2012@gmail.com

</div>

</footer>


</body>

</html>
