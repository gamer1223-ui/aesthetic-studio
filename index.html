<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aesthetic Studio V11</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toolbar">
  <input type="file" id="uploadImage">
  <button onclick="resetFilter()">Reset</button>
  <button onclick="startCrop()">Crop</button>
  <button onclick="applyCrop()">Apply Crop</button>
  <button onclick="addText()">Add Text</button>
  <input type="text" id="textInput" placeholder="Type text">
  <input type="color" id="textColor" value="#000000">
  <select id="fontSelect">
    <option value="Arial">Arial</option>
    <option value="Verdana">Verdana</option>
    <option value="Tahoma">Tahoma</option>
    <option value="Courier New">Courier New</option>
    <option value="Georgia">Georgia</option>
  </select>
  <label><input type="checkbox" id="textShadow"> Shadow</label>
  <label><input type="checkbox" id="textBorder"> Border</label>
</div>

<div class="filters">
  <button onclick="filterBright()">Bright</button>
  <button onclick="filterDark()">Dark</button>
  <button onclick="filterContrast()">Contrast</button>
  <button onclick="filterGray()">Gray</button>
  <button onclick="filterSepia()">Sepia</button>
  <button onclick="filterInvert()">Invert</button>
  <button onclick="filterBlur()">Blur</button>
  <button onclick="filterSharp()">Sharp</button>
  <button onclick="filterVintage()">Vintage</button>
  <button onclick="filterCool()">Cool</button>
  <button onclick="filterWarm()">Warm</button>
  <button onclick="filterPop()">Pop</button>
  <button onclick="filterSoft()">Soft</button>
  <button onclick="filterDream()">Dream</button>
  <button onclick="filterFilm()">Film</button>
</div>

<div class="sticker-library">
  <img src="stickers/sticker1.png">
  <img src="stickers/sticker2.png">
  <img src="stickers/sticker3.png">
  <!-- add more stickers as needed -->
</div>

<canvas id="canvas" width="800" height="600"></canvas>
<button onclick="downloadImage()">Download Edited Image</button>

<script src="editor.js"></script>
<script src="filters.js"></script>
<script src="stickers.js"></script>
<script src="text.js"></script>
<script src="crop.js"></script>
<script>
let baseImage = new Image();
const canvasEl = document.getElementById("canvas");
const ctx = canvasEl.getContext("2d");

document.getElementById("uploadImage").addEventListener("change", function(e){
  let reader = new FileReader();
  reader.onload = function(event){
    baseImage.src = event.target.result;
    baseImage.onload = function(){
      canvasEl.width = baseImage.width > 800 ? 800 : baseImage.width;
      canvasEl.height = baseImage.height > 600 ? 600 : baseImage.height;
      ctx.drawImage(baseImage,0,0,canvasEl.width,canvasEl.height);
      saveHistory();
    }
  }
  reader.readAsDataURL(e.target.files[0]);
});

// ===============================
// Undo/Redo
// ===============================
let history = [];
let historyStep = -1;

function saveHistory(){
  historyStep++;
  history = history.slice(0, historyStep);
  history.push(canvasEl.toDataURL());
}

function undo(){
  if(historyStep > 0){
    historyStep--;
    let img = new Image();
    img.src = history[historyStep];
    img.onload = function(){
      ctx.clearRect(0,0,canvasEl.width,canvasEl.height);
      ctx.drawImage(img,0,0,canvasEl.width,canvasEl.height);
    }
  }
}

function redo(){
  if(historyStep < history.length-1){
    historyStep++;
    let img = new Image();
    img.src = history[historyStep];
    img.onload = function(){
      ctx.clearRect(0,0,canvasEl.width,canvasEl.height);
      ctx.drawImage(img,0,0,canvasEl.width,canvasEl.height);
    }
  }
}

// ===============================
// Download
// ===============================
function downloadImage(){
  let link = document.createElement("a");
  link.download = "edited_image.png";
  link.href = canvasEl.toDataURL();
  link.click();
}
</script>
</body>
</html>
