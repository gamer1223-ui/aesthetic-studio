<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aesthetic Studio</title>

<style>

body{

margin:0;
font-family:Arial, Helvetica, sans-serif;

/* pink purple background */

background:linear-gradient(135deg,#ffd6ec,#e4d7ff);

min-height:1800px;

}


/* HEADER */

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 40px;

}

.title{

font-size:34px;
font-weight:bold;

}

.logo{

width:55px;

}


/* MAIN GRID */

.main-grid{

max-width:900px;
margin:auto;

display:grid;

grid-template-columns:1fr 1fr;

gap:40px;

padding:80px 20px;

}


/* PHOTO STYLE */

.photo{

width:100%;

aspect-ratio:16/9;

border-radius:14px;

overflow:hidden;

box-shadow:0 6px 15px rgba(0,0,0,0.2);

}

.photo img{

width:100%;
height:100%;

object-fit:cover;

}


/* CENTER AREA */

.center-area{

grid-column:span 2;

display:flex;

justify-content:center;
align-items:center;

flex-direction:column;

gap:20px;

margin:40px 0;

}


/* BUTTONS */

.main-btn{

padding:18px 36px;

font-size:18px;

border:none;

border-radius:14px;

cursor:pointer;

color:white;

background:#6a5cff;

box-shadow:0 5px 12px rgba(0,0,0,0.2);

}

.ai-btn{

background:#ff6ec7;

}


/* FOOTER */

footer{

position:absolute;

bottom:0;

width:100%;

text-align:center;

padding:30px;

}

footer a{

margin:0 20px;

text-decoration:none;

color:black;

font-weight:bold;

}

</style>

</head>

<body>


<header>

<div class="title">Aesthetic Studio</div>

<img src="logo.png" class="logo">

</header>


<div class="main-grid">

<!-- first photo -->

<div class="photo">

<img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c">

</div>


<!-- second photo -->

<div class="photo">

<img src="https://images.unsplash.com/photo-1600585152220-90363fe7e115">

</div>


<!-- center buttons -->

<div class="center-area">

<button class="main-btn">Do By Your Own</button>

<button class="main-btn ai-btn">Create With AI</button>

</div>


<!-- third photo -->

<div class="photo">

<img src="https://images.unsplash.com/photo-1600573472592-401b489a3cdc">

</div>


<!-- fourth photo -->

<div class="photo">

<img src="https://images.unsplash.com/photo-1600047509807-ba8f99d2cdde">

</div>


</div>


<footer>

<a href="#">About Us</a>

<a href="#">Privacy Policy</a>

<a href="#">Contact</a>

</footer>


</body>

</html>
