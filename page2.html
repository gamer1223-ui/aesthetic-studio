<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aesthetic Studio - Page 2</title>
<link rel="stylesheet" href="style.css">
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f9d5e5, #d6b0ff);
    overflow-x: hidden;
}

.bg-text {
    position: fixed;
    top: 0;
    left: 0;
    font-size: 5em;
    color: rgba(200,200,200,0.2);
    white-space: nowrap;
    transform: rotate(-25deg);
    animation: moveText 20s linear infinite;
    pointer-events: none;
    z-index: 0;
}

@keyframes moveText {
    0% { transform: translateX(100%) rotate(-25deg);}
    100% { transform: translateX(-100%) rotate(-25deg);}
}

.container {
    position: relative;
    z-index: 1;
    padding: 50px 20px;
    text-align: center;
    min-height: 100vh;
}

h1 {
    font-family: 'Cursive', sans-serif;
    font-weight: bold;
    font-size: 3em;
    color: black;
}

.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    margin-top: 40px;
}

.gallery img {
    width: 240px; /* approx 6cm */
    height: 320px; /* approx 8cm */
    object-fit: cover;
    border-radius: 15px;
    border: 3px solid white;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer;
}

.gallery img:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 25px rgba(0,0,0,0.4);
}

.btn {
    display: inline-block;
    margin-top: 30px;
    padding: 15px 35px;
    font-size: 1.1em;
    font-weight: bold;
    color: white;
    background: linear-gradient(90deg, #ff6fcf, #b565ff);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.2s;
}

.btn:hover {
    transform: scale(1.05);
}

.footer {
    margin-top: 60px;
    padding: 20px;
    background: rgba(255,255,255,0.6);
    text-align: center;
    font-size: 0.9em;
}

.spacer {
    margin: 20px 0;
    font-weight: bold;
    color: black;
    font-size: 1.2em;
}
</style>
</head>
<body>

<div class="bg-text">Aesthetic Studio &nbsp; Aesthetic Studio &nbsp; Aesthetic Studio &nbsp;</div>

<div class="container">
    <h1>Aesthetic Studio</h1>

    <div class="gallery">
        <img src="photo1.png" alt="Edited Photo 1">
        <img src="photo2.png" alt="Edited Photo 2">
        <img src="photo3.png" alt="Edited Photo 3">
        <img src="photo4.png" alt="Edited Photo 4">
    </div>

    <div class="spacer"></div> <!-- optional space for alignment -->

    <footer class="footer">
        About Us | Privacy Policy | Contact: proboys2012@gmail.com
    </footer>
</div>

</body>
</html>
