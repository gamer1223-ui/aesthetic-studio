<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aesthetic Studio</title>

<style>

body{

margin:0;

font-family:Arial;

text-align:center;

background:linear-gradient(135deg,#ffd6ec,#e5d4ff);

}


/* Header */

header{

display:flex;

justify-content:space-between;

align-items:center;

padding:20px 40px;

}

.site-title{

font-size:36px;

font-weight:bold;

}

.logo{

width:55px;

}


/* Photo grid */

.gallery{

display:grid;

grid-template-columns:1fr 1fr;

gap:40px;

padding:60px;

max-width:900px;

margin:auto;

}


/* Images */

.photo{

width:100%;

aspect-ratio:16/9;

border-radius:14px;

overflow:hidden;

box-shadow:0 6px 14px rgba(0,0,0,0.2);

}

.photo img{

width:100%;

height:100%;

object-fit:cover;

}


/* Center button */

.center-button{

grid-column:span 2;

display:flex;

justify-content:center;

align-items:center;

}

.edit-btn{

padding:18px 40px;

font-size:20px;

border:none;

border-radius:14px;

background:#6a5cff;

color:white;

cursor:pointer;

}


/* Footer */

footer{

margin-top:200px;

padding:30px;

}

footer a{

margin:0 20px;

text-decoration:none;

color:black;

font-weight:bold;

}

</style>

</head>

<body>


<header>

<div class="site-title">Aesthetic Studio</div>

<img src="logo.png" class="logo">

</header>


<div class="gallery">

<div class="photo">

<img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c">

</div>


<div class="photo">

<img src="https://images.unsplash.com/photo-1600585152220-90363fe7e115">

</div>


<div class="center-button">

<button class="edit-btn">Do By Your Own</button>

</div>


<div class="photo">

<img src="https://images.unsplash.com/photo-1600573472592-401b489a3cdc">

</div>


<div class="photo">

<img src="https://images.unsplash.com/photo-1600047509807-ba8f99d2cdde">

</div>

</div>


<footer>

<a href="#">About Us</a>

<a href="#">Privacy Policy</a>

<a href="#">Contact</a>

</footer>


</body>

</html>
