<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aesthetic Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
background:white;
text-align:center;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

.site-title{

font-family:'Dancing Script',cursive;
font-size:48px;
font-weight:bold;

background:linear-gradient(90deg, red, orange, yellow, green, blue, purple);
background-size:400%;

-webkit-background-clip:text;
color:transparent;

animation:rgbGlow 6s linear infinite;

}

@keyframes rgbGlow{
0%{background-position:0%}
100%{background-position:400%}
}

.logo{
width:60px;
}

.welcome{
margin-top:150px;
}

.dive-btn{

margin-top:30px;

padding:16px 40px;

font-size:18px;

border:none;

border-radius:12px;

background:#5b5bff;

color:white;

cursor:pointer;

}

footer{

margin-top:200px;

}

footer a{

margin:0 20px;

text-decoration:none;

color:#333;

}

</style>

</head>

<body>

<header>

<div class="site-title">Aesthetic Studio</div>

<img src="logo.png" class="logo">

</header>


<div class="welcome">

<h2>Welcome to the Pro Photo Editor</h2>

<p>Create stunning photos with stickers, filters, crop tools and download in HD quality.</p>

<button class="dive-btn" onclick="openPage2()">Dive In</button>

</div>


<footer>

<a href="#">About Us</a>

<a href="#">Privacy Policy</a>

<a href="#">Contact</a>

</footer>


<script>

function openPage2(){

window.location.href="./page2.html";

}

</script>


</body>

</html>
