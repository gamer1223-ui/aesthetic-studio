<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aesthetic Studio</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;

/* GREEN BLENDED BACKGROUND */

background:linear-gradient(135deg,#0f3d2e,#1f6f54,#e9fff4);

color:white;

display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* MAIN CONTAINER */

.container{
text-align:center;
max-width:900px;
padding:40px;
position:relative;
z-index:1;
}

/* RGB TITLE */

.title{
font-size:72px;
font-weight:bold;
margin-bottom:30px;

background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,purple);
background-size:400%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:rgbMove 6s linear infinite;
}

@keyframes rgbMove{
0%{background-position:0%}
100%{background-position:400%}
}

/* BIG TEXT */

.big-text{
font-size:36px;
font-weight:bold;
margin-bottom:20px;
}

/* SMALL DESCRIPTION */

.small-text{
font-size:18px;
color:#d7f5e6;
line-height:1.6;
margin-bottom:30px;
}

/* EMAIL */

.email{
font-size:16px;
color:#c7e9da;
margin-bottom:20px;
}

/* DIVE BUTTON */

.dive-btn{
margin-top:20px;
background:white;
color:#0f3d2e;
padding:14px 28px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;

transition:transform 0.2s ease, box-shadow 0.2s ease;
}

.dive-btn:hover{
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.dive-btn:active{
transform:scale(0.95);
}

/* PARTICLES BACKGROUND */

.particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.particles span{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:0.5;
animation:float 10s linear infinite;
}

@keyframes float{

0%{
transform:translateY(100vh) scale(0);
opacity:0;
}

50%{
opacity:0.7;
}

100%{
transform:translateY(-10vh) scale(1);
opacity:0;
}

}

</style>

</head>

<body>

<!-- PARTICLES -->

<div class="particles">

<span style="left:10%;animation-delay:0s"></span>
<span style="left:20%;animation-delay:2s"></span>
<span style="left:30%;animation-delay:4s"></span>
<span style="left:40%;animation-delay:1s"></span>
<span style="left:50%;animation-delay:3s"></span>
<span style="left:60%;animation-delay:5s"></span>
<span style="left:70%;animation-delay:2s"></span>
<span style="left:80%;animation-delay:4s"></span>
<span style="left:90%;animation-delay:1s"></span>

</div>

<div class="container">

<div class="title">
Aesthetic Studio
</div>

<div class="big-text">
Create Ideas. Shape Design. Build Beauty.
</div>

<div class="small-text">
Aesthetic Studio is a creative digital space where imagination turns into design. 
Explore visual inspiration, experiment with editing tools, and transform simple 
images into stunning aesthetic creations.
</div>

<div class="email">
Contact: proboys2012@gmail.com
</div>

<button class="dive-btn" onclick="window.location.href='page2.html'">
Dive In →
</button>

</div>

</body>

</html>
