<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aesthetic Studio</title>

<style>

body{
margin:0;
font-family:Arial;

/* LIGHT GREEN BLEND BACKGROUND */

background:linear-gradient(135deg,#5fbf9f,#a7e6d3,#ffffff);

color:white;

display:flex;
align-items:center;
justify-content:center;

min-height:100vh;
text-align:center;
}

/* MAIN CONTAINER */

.container{
max-width:900px;
padding:40px 20px;
}

/* RGB TITLE */

.title{

font-size:64px;
font-weight:bold;
margin-bottom:25px;

background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,purple);
background-size:400%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:rgbMove 6s linear infinite;

}

@keyframes rgbMove{

0%{background-position:0%}
100%{background-position:400%}

}

/* BIG TEXT */

.big-text{

font-size:34px;
font-weight:bold;
color:white;
margin-bottom:20px;

}

/* SMALL DESCRIPTION */

.small-text{

font-size:18px;
color:#e9f7f2;
line-height:1.5;
margin-bottom:25px;

}

/* EMAIL */

.email{

font-size:16px;
color:#eafaf4;
margin-bottom:30px;

}

/* DIVE BUTTON */

.dive-btn{

background:black;
color:white;

padding:15px 36px;

font-size:18px;
font-weight:bold;

border:2px solid #e8fff7;

border-radius:12px;

cursor:pointer;

transition:all 0.2s ease;

}

.dive-btn:hover{

transform:translateY(-3px);
box-shadow:0 8px 20px rgba(0,0,0,0.3);

}

.dive-btn:active{

transform:scale(0.95);

}

</style>

</head>

<body>

<div class="container">

<div class="title">
Aesthetic Studio
</div>

<div class="big-text">
Create Ideas. Shape Design. Build Beauty.
</div>

<div class="small-text">
A simple space to explore creative design and visual inspiration.
</div>

<div class="email">
Contact: proboys2012@gmail.com
</div>

<button class="dive-btn" onclick="window.location.href='page2.html'">
Dive In →
</button>

</div>

</body>

</html>
